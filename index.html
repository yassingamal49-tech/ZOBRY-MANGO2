<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Styled Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;

            background-color: #222831;
            background-image: url("https://via.placeholder.com/1200");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            color: lightcyan;
            text-shadow: 0 0 10px lightblue;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
            padding: 20px;
        }

        img {
            width: 300px;
            border-radius: 12px;
        }

        .text {
            max-width: 500px;
            text-align: left;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .highlight {
            color: lightcyan;
        }
    </style>
</head>

<body>

    <h1>My Website</h1>

    <div class="container">
        <img src="assets/svg/AboutMe.svg" alt="Sample Image">

        <div class="text">
            <p>
                <span class="highlight">Innovation starts with a small idea and great determination, and grows through learning, persistence, and the courage to keep improving every day."</span> 
            </p>
        </div>
    </div>

</body>
</html>
